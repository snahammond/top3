name: Generate Gradle Wrapper

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Gradle 8.2.1
        run: |
          wget https://services.gradle.org/distributions/gradle-8.2.1-bin.zip
          unzip gradle-8.2.1-bin.zip
          echo "GRADLE_HOME=$PWD/gradle-8.2.1" >> $GITHUB_ENV
          echo "$PWD/gradle-8.2.1/bin" >> $GITHUB_PATH

      - name: Generate wrapper
        run: gradle wrapper --gradle-version 8.2.1

      - name: Upload wrapper files
        uses: actions/upload-artifact@v4
        with:
          name: wrapper-files
          path: |
            gradlew
            gradlew.bat
            gradle/wrapper/
